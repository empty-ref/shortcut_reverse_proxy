[tool.ruff]
line-length = 120
indent-width = 4
target-version = "py310"

[tool.ruff.format]
quote-style = "single"
indent-style = "space"
line-ending = "lf"

[tool.ruff.lint]
select = ["E", "F", "UP", "B", "SIM", "I"]
ignore = [
  "SIM103",
  "SIM117",
  "B023"
]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
