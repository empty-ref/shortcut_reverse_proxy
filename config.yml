listen_host: 127.0.0.1
listen_port: 8080

connect_timeout: 3.0
read_timeout: 15.0
write_timeout: 15.0
total_timeout: 30.0
max_header_bytes: 65536
max_requests_per_client_connection: 100

max_client_conns: 1200
max_conns_per_upstream: 300

tcp_keepalive_idle: 30
tcp_keepalive_interval: 10
tcp_keepalive_count: 3

upstreams:
  - host: 127.0.0.1
    port: 9001
  - host: 127.0.0.1
    port: 9002
